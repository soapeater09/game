<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brick Dungeon - Endless Dash</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { background: #2c2c2c; border: 4px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { margin-top: 10px; text-align: center; }
        kbd { background: #444; padding: 2px 6px; border-radius: 4px; border: 1px solid #888; }
    </style>
</head>
<body>
    <div class="ui">
        Rooms Cleared: <span id="score">0</span><br>
        <small><kbd>WASD</kbd> Move | <kbd>SPACE</kbd> Jump | <kbd>SHIFT</kbd> Dash | <kbd>R</kbd> Reset</small>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

canvas.width = 600;
canvas.height = 400;

// Game Constants
const GRAVITY = 0.6;
const FRICTION = 0.8;
const JUMP_FORCE = -10;
const MOVE_SPEED = 0.8;
const MAX_SPEED = 5;
const DASH_FORCE = 15;
const TILE_SIZE = 40;

let score = 0;
let player = {
    x: 50, y: 300, w: 24, h: 32,
    vx: 0, vy: 0,
    grounded: false,
    canDash: true,
    dashing: false,
    dashCooldown: 0,
    facing: 1, // 1 right, -1 left
    lastWall: 0 // -1 for left wall, 1 for right
};

let keys = {};
let platforms = [];
let hazards = [];
let exit = { x: 0, y: 0, w: 40, h: 60 };

function initRoom() {
    platforms = [];
    hazards = [];
    
    // Floor and Walls
    platforms.push({ x: 0, y: 380, w: 600, h: 20, type: 'brick' }); // Floor
    platforms.push({ x: 0, y: 0, w: 20, h: 400, type: 'brick' });   // Left wall
    platforms.push({ x: 580, y: 0, w: 20, h: 400, type: 'brick' }); // Right wall
    platforms.push({ x: 0, y: 0, w: 600, h: 20, type: 'brick' });   // Ceiling

    // Random Procedural Elements (Ensuring a path)
    for (let i = 0; i < 6; i++) {
        let px = 80 + Math.random() * 400;
        let py = 100 + (i * 50);
        let pw = 60 + Math.random() * 100;
        platforms.push({ x: px, y: py, w: pw, h: 15, type: 'brick' });
        
        // Add random spikes on some platforms
        if (Math.random() > 0.6) {
            hazards.push({ x: px + 10, y: py - 10, w: pw - 20, h: 10 });
        }
    }

    // Pits
    if (Math.random() > 0.5) {
        platforms[0].w = 200; // Create hole in floor
        platforms.push({ x: 400, y: 380, w: 200, h: 20, type: 'brick' });
    }

    // Exit position
    exit.x = 530;
    exit.y = 50;
    player.x = 40;
    player.y = 340;
    player.vx = 0;
    player.vy = 0;
}

function resetGame() {
    score = 0;
    scoreEl.innerText = score;
    initRoom();
}

window.addEventListener('keydown', e => { 
    keys[e.code] = true; 
    if(e.code === 'KeyR') resetGame();
    if(e.code === 'ShiftLeft' && player.canDash) dash();
});
window.addEventListener('keyup', e => keys[e.code] = false);

function dash() {
    player.dashing = true;
    player.canDash = false;
    player.vy = 0;
    player.vx = player.facing * DASH_FORCE;
    setTimeout(() => { player.dashing = false; }, 150);
}

function update() {
    // Movement Logic
    if (!player.dashing) {
        if (keys['KeyA'] || keys['ArrowLeft']) {
            player.vx -= MOVE_SPEED;
            player.facing = -1;
        } else if (keys['KeyD'] || keys['ArrowRight']) {
            player.vx += MOVE_SPEED;
            player.facing = 1;
        }
        player.vx *= FRICTION;
        player.vy += GRAVITY;
    }

    player.x += player.vx;
    player.y += player.vy;

    player.grounded = false;

    // Collision Detection
    platforms.forEach(rect => {
        if (player.x < rect.x + rect.w && player.x + player.w > rect.x &&
            player.y < rect.y + rect.h && player.y + player.h > rect.y) {
            
            let overlapX = Math.min(player.x + player.w - rect.x, rect.x + rect.w - player.x);
            let overlapY = Math.min(player.y + player.h - rect.y, rect.y + rect.h - player.y);

            if (overlapX < overlapY) {
                // Wall Collision / Wall Jump Prep
                if (player.x < rect.x) {
                    player.x -= overlapX;
                    player.lastWall = 1;
                } else {
                    player.x += overlapX;
                    player.lastWall = -1;
                }
                player.vx = 0;
            } else {
                // Floor/Ceiling Collision
                if (player.y < rect.y) {
                    player.y -= overlapY;
                    player.vy = 0;
                    player.grounded = true;
                    player.canDash = true;
                    player.lastWall = 0;
                } else {
                    player.y += overlapY;
                    player.vy *= -0.5;
                }
            }
        }
    });

    // Jump / Wall Jump Logic
    if (keys['Space'] && (player.grounded)) {
        player.vy = JUMP_FORCE;
        player.grounded = false;
    } else if (keys['Space'] && player.lastWall !== 0 && !player.grounded) {
        player.vy = JUMP_FORCE * 0.8;
        player.vx = -player.lastWall * 8; // Kick off the wall
        player.lastWall = 0;
    }

    // Hazard Collision
    hazards.forEach(h => {
        if (player.x < h.x + h.w && player.x + player.w > h.x &&
            player.y < h.y + h.h && player.y + player.h > h.y) {
            resetGame();
        }
    });

    // Pit death
    if (player.y > canvas.height) resetGame();

    // Exit Room
    if (player.x < exit.x + exit.w && player.x + player.w > exit.x &&
        player.y < exit.y + exit.h && player.y + player.h > exit.y) {
        score++;
        scoreEl.innerText = score;
        initRoom();
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Platforms (Bricks)
    ctx.fillStyle = '#7d3c3c';
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#5d2c2c';
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // Draw Hazards (Spikes)
    ctx.fillStyle = '#aaa';
    hazards.forEach(h => {
        ctx.beginPath();
        ctx.moveTo(h.x, h.y + h.h);
        ctx.lineTo(h.x + h.w/2, h.y);
        ctx.lineTo(h.x + h.w, h.y + h.h);
        ctx.fill();
    });

    // Draw Exit
    ctx.font = '40px serif';
    ctx.fillText('🚪', exit.x, exit.y + 45);

    // Draw Player
    ctx.font = '30px serif';
    // Flip emoji based on direction
    ctx.save();
    ctx.translate(player.x + 12, player.y + 16);
    if(player.facing === -1) ctx.scale(-1, 1);
    ctx.fillText(player.canDash ? '🏃' : '😰', -12, 12);
    ctx.restore();
}

initRoom();
update();
</script>
</body>
</html>
