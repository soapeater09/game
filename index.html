<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brick Dungeon Crawler</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #eee; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #2c3e50; border: 4px solid #34495e; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        .controls { margin-top: 10px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="ui">
        <h1 id="score">Rooms Cleared: 0</h1>
        <div class="controls">WASD to Move | Shift to Dash | Space to Jump</div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

canvas.width = 800;
canvas.height = 600;

// Game Constants
const TILE_SIZE = 40;
const COLS = canvas.width / TILE_SIZE;
const ROWS = canvas.height / TILE_SIZE;
const GRAVITY = 0.4;
const FRICTION = 0.8;
const JUMP_FORCE = -8;
const DASH_SPEED = 12;

let score = 0;
let level = [];
let player = {
    x: 50, y: 50, w: 30, h: 30,
    vx: 0, vy: 0,
    onGround: false,
    canDash: true,
    isDashing: 0,
    wallSliding: false,
    facing: 1 // 1 for right, -1 for left
};

const keys = {};
window.onkeydown = e => { keys[e.code] = true; if(e.code === 'KeyK') dash(); };
window.onkeyup = e => keys[e.code] = false;

function generateLevel() {
    level = [];
    // Fill with empty space
    for(let y = 0; y < ROWS; y++) {
        level[y] = [];
        for(let x = 0; x < COLS; x++) {
            // Borders
            if(x === 0 || x === COLS-1 || y === 0 || y === ROWS-1) level[y][x] = 'brick';
            else level[y][x] = 'air';
        }
    }

    // Simple Procedural Path (Guarantees exit is reachable)
    let curX = 1;
    let curY = ROWS - 2;
    player.x = curX * TILE_SIZE;
    player.y = curY * TILE_SIZE;

    // Create a "drunkard's walk" path to the exit
    while(curX < COLS - 2) {
        let step = Math.random();
        if(step < 0.6) curX++; 
        else if(step < 0.8 && curY > 2) curY--;
        else if(curY < ROWS - 3) curY++;
        
        level[curY][curX] = 'air';
        level[curY+1][curX] = 'brick'; // Floor
    }
    level[curY][COLS-2] = 'door';

    // Add random hazards
    for(let i = 0; i < 15; i++) {
        let rx = Math.floor(Math.random() * (COLS-2)) + 1;
        let ry = Math.floor(Math.random() * (ROWS-2)) + 1;
        if(level[ry][rx] === 'air' && level[ry+1][rx] === 'brick') {
            level[ry][rx] = Math.random() > 0.5 ? 'spike' : 'air';
        }
        if(level[ry+1][rx] === 'brick' && Math.random() > 0.8) {
             level[ry+1][rx] = 'pit'; // Bottomless pit
        }
    }
}

function dash() {
    if(player.canDash) {
        player.isDashing = 10;
        player.canDash = false;
        player.vy = 0;
    }
}

function update() {
    // Movement logic
    if (player.isDashing > 0) {
        player.vx = player.facing * DASH_SPEED;
        player.isDashing--;
    } else {
        if (keys['KeyA'] || keys['ArrowLeft']) { player.vx -= 0.8; player.facing = -1; }
        if (keys['KeyD'] || keys['ArrowRight']) { player.vx += 0.8; player.facing = 1; }
        player.vx *= FRICTION;
        player.vy += GRAVITY;
    }

    // Jump
    if ((keys['Space'] || keys['KeyW']) && player.onGround) {
        player.vy = JUMP_FORCE;
        player.onGround = false;
    }

    // Update Position
    player.x += player.vx;
    checkCollisions('x');
    player.y += player.vy;
    checkCollisions('y');

    // Bounds/Death check
    if(player.y > canvas.height) resetGame();

    draw();
    requestAnimationFrame(update);
}

function checkCollisions(axis) {
    player.wallSliding = false;
    for(let y = 0; y < ROWS; y++) {
        for(let x = 0; x < COLS; x++) {
            if(level[y][x] === 'air') continue;

            let tx = x * TILE_SIZE;
            let ty = y * TILE_SIZE;

            if(player.x < tx + TILE_SIZE && player.x + player.w > tx &&
               player.y < ty + TILE_SIZE && player.y + player.h > ty) {
                
                if(level[y][x] === 'door') {
                    score++;
                    scoreEl.innerText = `Rooms Cleared: ${score}`;
                    generateLevel();
                    return;
                }
                
                if(level[y][x] === 'spike' || level[y][x] === 'pit') {
                    resetGame();
                    return;
                }

                if(level[y][x] === 'brick') {
                    if(axis === 'x') {
                        if(player.vx > 0) player.x = tx - player.w;
                        if(player.vx < 0) player.x = tx + TILE_SIZE;
                        // Wall Jump Logic
                        if(!player.onGround && player.vy > 0) {
                            player.wallSliding = true;
                            if(keys['Space']) {
                                player.vy = JUMP_FORCE;
                                player.vx = player.vx > 0 ? -7 : 7;
                            }
                        }
                        player.vx = 0;
                    } else {
                        if(player.vy > 0) {
                            player.y = ty - player.h;
                            player.onGround = true;
                            player.canDash = true;
                        }
                        if(player.vy < 0) player.y = ty + TILE_SIZE;
                        player.vy = 0;
                    }
                }
            }
        }
    }
}

function resetGame() {
    score = 0;
    scoreEl.innerText = `Rooms Cleared: 0`;
    generateLevel();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for(let y = 0; y < ROWS; y++) {
        for(let x = 0; x < COLS; x++) {
            let tx = x * TILE_SIZE;
            let ty = y * TILE_SIZE;
            if(level[y][x] === 'brick') {
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = '#3e2723';
                ctx.strokeRect(tx, ty, TILE_SIZE, TILE_SIZE);
            } else if(level[y][x] === 'spike') {
                ctx.font = '30px serif';
                ctx.fillText('🌵', tx + 5, ty + 30);
            } else if(level[y][x] === 'door') {
                ctx.font = '30px serif';
                ctx.fillText('🚪', tx + 5, ty + 30);
            } else if(level[y][x] === 'pit') {
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // Draw Player
    ctx.font = '24px serif';
    ctx.save();
    if(player.facing === -1) {
        ctx.scale(-1, 1);
        ctx.fillText('🏃', -player.x - player.w, player.y + 25);
    } else {
        ctx.fillText('🏃', player.x, player.y + 25);
    }
    ctx.restore();

    // Dash trail effect
    if(player.isDashing > 0) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.fillRect(player.x, player.y, player.w, player.h);
    }
}

generateLevel();
update();
</script>
</body>
</html>
