<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Crawler: Endless Dungeon</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #eee; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #222; image-rendering: pixelated; }
        .ui { position: absolute; top: 20px; text-align: center; pointer-events: none; width: 100%; }
        h1 { margin: 0; font-size: 24px; color: #e74c3c; text-shadow: 2px 2px #000; }
        .stats { font-size: 18px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>BRICK CRAWLER</h1>
        <div class="stats">Rooms Cleared: <span id="score">0</span> | Dash: <span id="dash">READY</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const dashEl = document.getElementById('dash');

canvas.width = 400;
canvas.height = 600;

// Game Constants
const GRAVITY = 0.4;
const FRICTION = 0.8;
const JUMP_FORCE = -8;
const WALL_JUMP_X = 6;
const DASH_FORCE = 12;
const TILE_SIZE = 40;

let score = 0;
let particles = [];

// Player Object
const player = {
    x: 200, y: 500, w: 20, h: 20,
    vx: 0, vy: 0,
    onGround: false,
    onWall: 0, // -1 left, 1 right, 0 none
    canDash: true,
    isDashing: false,
    color: '#3498db'
};

const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

let platforms = [];

function generateRoom() {
    platforms = [];
    // Floor
    platforms.push({x: 0, y: canvas.height - 20, w: canvas.width, h: 20, type: 'wall'});
    // Walls
    platforms.push({x: 0, y: 0, w: 20, h: canvas.height, type: 'wall'});
    platforms.push({x: canvas.width - 20, y: 0, w: 20, h: canvas.height, type: 'wall'});
    // Exit (Top)
    platforms.push({x: 150, y: 0, w: 100, h: 10, type: 'exit'});

    // Random Procedural Platforms
    for(let i = 0; i < 8; i++) {
        let x = 40 + Math.random() * (canvas.width - 120);
        let y = 80 + (i * 60);
        let w = 60 + Math.random() * 40;
        platforms.push({x, y, w, h: 15, type: 'wall'});
        
        // Add random spikes
        if(Math.random() > 0.7) {
            platforms.push({x: x + 10, y: y - 10, w: 20, h: 10, type: 'spike'});
        }
    }
}

function resetPlayer() {
    player.x = 200;
    player.y = canvas.height - 60;
    player.vx = 0;
    player.vy = 0;
    player.canDash = true;
}

function update() {
    // Movement Logic
    if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= 0.8;
    if (keys['ArrowRight'] || keys['KeyD']) player.vx += 0.8;
    
    // Jump
    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.onGround) {
        player.vy = JUMP_FORCE;
        player.onGround = false;
    } 
    // Wall Jump
    else if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.onWall !== 0) {
        player.vy = JUMP_FORCE;
        player.vx = -player.onWall * WALL_JUMP_X;
        player.onWall = 0;
    }

    // Dash
    if (keys['ShiftLeft'] && player.canDash) {
        player.isDashing = true;
        player.canDash = false;
        let dx = (keys['ArrowRight'] || keys['KeyD']) ? 1 : (keys['ArrowLeft'] || keys['KeyA']) ? -1 : 0;
        let dy = (keys['ArrowDown'] || keys['KeyS']) ? 1 : (keys['ArrowUp'] || keys['KeyW']) ? -1 : 0;
        if(dx === 0 && dy === 0) dx = 1; // Default dash
        player.vx = dx * DASH_FORCE;
        player.vy = dy * DASH_FORCE;
        setTimeout(() => { player.isDashing = false; }, 150);
    }

    if (!player.isDashing) {
        player.vy += GRAVITY;
        player.vx *= FRICTION;
    }

    player.x += player.vx;
    player.y += player.vy;

    // Collision & Mechanics
    player.onGround = false;
    player.onWall = 0;

    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y < p.y + p.h && player.y + player.h > p.y) {
            
            if (p.type === 'spike') {
                score = 0;
                scoreEl.innerText = score;
                resetPlayer();
                generateRoom();
            } else if (p.type === 'exit') {
                score++;
                scoreEl.innerText = score;
                resetPlayer();
                generateRoom();
            } else {
                // Resolve Wall/Floor collision
                let overlapX = Math.min(player.x + player.w - p.x, p.x + p.w - player.x);
                let overlapY = Math.min(player.y + player.h - p.y, p.y + p.h - player.y);

                if (overlapX < overlapY) {
                    player.vx = 0;
                    player.x += (player.x < p.x) ? -overlapX : overlapX;
                    player.onWall = (player.x < p.x) ? 1 : -1;
                } else {
                    player.vy = 0;
                    player.y += (player.y < p.y) ? -overlapY :
