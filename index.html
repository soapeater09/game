<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Dungeon Crawler</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #eee; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #222; image-rendering: pixelated; }
        .ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        .controls { margin-top: 10px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="ui">
        <h2 id="score">Rooms Cleared: 0</h2>
        <div class="controls">WASD: Move/Jump | SHIFT: Dash | R: Reset</div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

// --- Configuration ---
canvas.width = 800;
canvas.height = 600;
const TILE_SIZE = 40;
const GRAVITY = 0.6;
const FRICTION = 0.8;
const ACCEL = 1.2;
const MAX_SPEED = 6;
const JUMP_FORCE = -12;
const DASH_SPEED = 15;

let score = 0;
let gameState = 'PLAYING';

// --- Input Handling ---
const keys = {};
window.onkeydown = (e) => { keys[e.code] = true; if(e.code === 'KeyR') resetGame(); };
window.onkeyup = (e) => keys[e.code] = false;

// --- Entities ---
let player = {
    x: 50, y: 50, w: 25, h: 25,
    vx: 0, vy: 0,
    onGround: false,
    canDash: true,
    isDashing: 0,
    wallSliding: false,
    coyoteTimer: 0,
    jumpBuffer: 0,
    lastDir: 1
};

let platforms = [];
let hazards = [];

// --- Level Generation ---
function generateRoom() {
    platforms = [];
    hazards = [];
    
    // Borders
    platforms.push({x: 0, y: 0, w: 20, h: canvas.height}); // Left
    platforms.push({x: 0, y: 0, w: canvas.width, h: 20});  // Top
    platforms.push({x: 0, y: canvas.height - 20, w: canvas.width, h: 20}); // Bottom

    // Random Procedural Bricks
    for (let i = 0; i < 15; i++) {
        let rw = Math.random() * 100 + 40;
        let rx = Math.random() * (canvas.width - 200) + 100;
        let ry = Math.random() * (canvas.height - 150) + 100;
        platforms.push({x: rx, y: ry, w: rw, h: 20});
        
        // Add spikes to some platforms
        if (Math.random() > 0.7) {
            hazards.push({x: rx + 10, y: ry - 10, w: rw - 20, h: 10});
        }
    }

    // Death Pits (Gaps in floor)
    if (Math.random() > 0.5) {
        platforms = platforms.filter(p => p.y < canvas.height - 25);
        platforms.push({x: 0, y: canvas.height - 20, w: 200, h: 20});
        platforms.push({x: canvas.width - 200, y: canvas.height - 20, w: 200, h: 20});
        hazards.push({x: 200, y: canvas.height - 10, w: canvas.width - 400, h: 40});
    }
}

function resetGame() {
    score = 0;
    scoreEl.innerText = `Rooms Cleared: ${score}`;
    player.x = 50; player.y = 300;
    player.vx = 0; player.vy = 0;
    generateRoom();
    gameState = 'PLAYING';
}

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.w && rect1.x + rect1.w > rect2.x &&
           rect1.y < rect2.y + rect2.h && rect1.y + rect1.h > rect2.y;
}

function update() {
    if (gameState === 'DEAD') return;

    // Movement Logic
    let dirX = (keys['KeyD'] || keys['ArrowRight'] ? 1 : 0) - (keys['KeyA'] || keys['ArrowLeft'] ? 1 : 0);
    let dirY = (
