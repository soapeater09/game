<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Dungeon Crawler</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: #eee; font-family: monospace; }
        canvas { background: #2c2c2c; border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); image-rendering: pixelated; }
        .ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        h1 { margin: 0; font-size: 24px; color: #ffcc00; text-shadow: 2px 2px #000; }
        .controls { margin-top: 10px; color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div class="ui">
        <h1 id="scoreBoard">ROOMS CLEARED: 0</h1>
        <div class="controls">WASD to Move | SHIFT to Dash | R to Reset</div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreBoard = document.getElementById('scoreBoard');

// Game Constants
const TILE_SIZE = 40;
const COLS = 16;
const ROWS = 12;
canvas.width = COLS * TILE_SIZE;
canvas.height = ROWS * TILE_SIZE;

let score = 0;
let keys = {};
let particles = [];

// Player Physics
const player = {
    x: 80, y: 80, w: 24, h: 32,
    vx: 0, vy: 0,
    speed: 0.8, friction: 0.85, gravity: 0.6, jumpPower: -12,
    grounded: false, canDash: true, isDashing: 0,
    wallSliding: false, facing: 1
};

let level = [];

function generateLevel() {
    level = [];
    for (let y = 0; y < ROWS; y++) {
        level[y] = [];
        for (let x = 0; x < COLS; x++) {
            // Borders
            if (x === 0 || x === COLS - 1 || y === 0 || y === ROWS - 1) {
                level[y][x] = (x === COLS - 1 && y === ROWS - 2) ? 2 : 1; // 2 is Exit
            } else {
                // Random platforms, leave center somewhat clear
                level[y][x] = (Math.random() > 0.85 && x > 3) ? 1 : 0;
            }
        }
    }
    // Ensure entrance is clear
    level[ROWS-2][1] = 0; level[ROWS-3][1] = 0;
    player.x = TILE_SIZE + 5;
    player.y = (ROWS - 2) * TILE_SIZE;
    player.vx = 0; player.vy = 0;
}

window.addEventListener('keydown', e => { 
    keys[e.code] = true; 
    if(e.code === 'ShiftLeft' && player.canDash) startDash();
    if(e.code === 'KeyR') { score = 0; generateLevel(); }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function startDash() {
    player.isDashing = 10;
    player.canDash = false;
    spawnParticles(player.x, player.y, '#fff');
}

function spawnParticles(x, y, color) {
    for(let i=0; i<8; i++) {
        particles.push({x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, color});
    }
}

function update() {
    // Movement logic
    if (player.isDashing > 0) {
        player.vx = player.facing * 12;
        player.vy = 0;
        player.isDashing--;
    } else {
        if (keys['KeyA']) { player.vx -= player.speed; player.facing = -1; }
        if (keys['KeyD']) { player.vx += player.speed; player.facing = 1; }
        player.vx *= player.friction;

        // Gravity & Wall Slide
        player.vy += player.gravity;
        if (player.wallSliding) player.vy = Math.min(player.vy, 2);

        if (keys['KeyW'] && player.grounded) {
            player.vy = player.jumpPower;
            player.grounded = false;
        }
    }

    // Collision Math
    let oldX = player.x;
    let oldY = player.y;
    player.x += player.vx;
    checkCollision(true); // X Collision
    player.y += player.vy;
    checkCollision(false); // Y Collision

    // Reset Dash on ground
    if (player.grounded) player.canDash = true;

    // Particles
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        if(p.life <= 0) particles.splice(i, 1);
    });

    draw();
    requestAnimationFrame(update);
}

function checkCollision(isX) {
    player.grounded = false;
    player.wallSliding = false;

    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            if (level[y][x] === 0) continue;

            let tx = x * TILE_SIZE;
            let ty = y * TILE_SIZE;

            if (player.x < tx + TILE_SIZE && player.x + player.w > tx &&
                player.y < ty + TILE_SIZE && player.y + player.h > ty) {
                
                if (level[y][x] === 2) { // Exit reached
                    score++;
                    scoreBoard.innerText = `ROOMS CLEARED: ${score}`;
                    generateLevel();
                    return;
                }

                if (isX) {
                    if (player.vx > 0) player.x = tx - player.w;
                    if (player.vx < 0) player.x = tx + TILE_SIZE;
                    if (!player.grounded && player.vy > 0) player.wallSliding = true;
                    player.vx = 0;
                } else {
                    if (player.vy > 0) { player.y = ty - player.h; player.grounded = true; }
                    if (player.vy < 0) player.y = ty + TILE_SIZE;
                    player.vy = 0;
                }
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Tiles
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            if (level[y][x] === 1) {
                ctx.fillStyle = '#555';
                ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = '#333';
                ctx.strokeRect(x*TILE_SIZE+2, y*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
            } else if (level[y][x] === 2) {
                ctx.font = '30px serif';
                ctx.fillText('🚪', x*TILE_SIZE + 5, y*TILE_SIZE + 30);
            }
        }
    }

    // Draw Particles
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 20;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1;

    // Draw Player
    ctx.font = '32px serif';
    ctx.save();
    // Flip emoji based on direction
    if (player.facing === -1) {
        ctx.scale(-1, 1);
        ctx.fillText('🏃', -player.x - player.w, player.y + 28);
    } else {
        ctx.fillText('🏃', player.x, player.y + 28);
    }
    ctx.restore();
    
    // Dash indicator
    if (player.canDash) {
        ctx.strokeStyle = '#00ffff';
        ctx.strokeRect(player.x - 2, player.y - 2, player.w + 4, player.h + 4);
    }
}

generateLevel();
update();
</script>
</body>
</html>
